<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>DockSpatial</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000000;
      color: white;
    }

    header {
  background-image: url('banniere2.png');
  background-size: cover;
  background-position: center;
  
  margin: 30px auto;
  width: 85%;
  max-width: 1200px;
  height: 300px;

  border-radius: 25px;

  box-shadow: 0 0 25px #0094FF;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  text-align: center;

  border: 1px solid rgba(255,255,255,0.08);

  overflow: hidden;
}

    h1 {
      font-size: 42px;
      letter-spacing: 2px;
    }

    p {
      color: #aaa;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 40px;
    }

    .card {
  border: 1px solid rgba(255,255,255,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.05);
  border-color: #7aa2ff;
}
    .card img {
      width: 100%;
      border-radius: 8px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #666;
    }
  </style>
</head>

<body>

<header>
  <h1>DockSpatial</h1>
  <p>Ici, je construis des vaisseaux spatiaux à partir d’objets détournés, de pièces de maquettes et de matériaux récupérés.</p>
</header>

<section class="gallery">

  <div class="card">
    <img src="https://via.placeholder.com/400x250">
    <p>Maquette 1</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/400x250">
    <p>Maquette 2</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/400x250">
    <p>Maquette 3</p>
  </div>

</section>

<footer>
  © 2026 DockSpatial
</footer>

</body>
</html>
