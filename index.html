<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>DockSpatial</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
    }

    header {
      padding: 70px;
      text-align: center;
      background: linear-gradient(90deg, #0b0f1a, #111a33);
    }

    h1 {
      font-size: 42px;
      letter-spacing: 2px;
    }

    p {
      color: #aaa;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 15px;
      padding: 40px;
    }

    .card {
      background: #151c2e;
      padding: 10px;
      border-radius: 10px;
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #666;
    }
  </style>
</head>

<body>

<header>
  <h1>DockSpatial</h1>
  <p>Studio de maquettes Science-Fiction</p>
</header>

<section class="gallery">

  <div class="card">
    <img src="https://via.placeholder.com/400x250">
    <p>Maquette 1</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/400x250">
    <p>Maquette 2</p>
  </div>

  <div class="card">
    <img src="https://via.placeholder.com/400x250">
    <p>Maquette 3</p>
  </div>

</section>

<footer>
  © 2026 DockSpatial
</footer>

</body>
</html>
