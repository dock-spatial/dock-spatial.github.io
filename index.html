<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>DockSpatial</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000000;
      color: white;
    }
    
    header {
  background-image: url('banniere3.png');
  background-size: cover;
  background-position: center;
  
  margin: 30px auto;
  width: 85%;
  max-width: 1000px;
  height: 170px;

  border-radius: 25px;

  box-shadow: 0 0 25px #0094FF;

  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;

  text-align: center;

  border: 1px solid rgba(255,255,255,0.08);

  overflow: hidden;
}
header h1,
header p {
  display: none;
}
 .hidden-title {
  position: absolute;
  left: -9999px;
}

    h1 {
      font-size: 42px;
      letter-spacing: 2px;
    }

  .description {
  text-align: center;
  margin-top: 20px;

  color: #0094FF;

  font-size: 18px;
  font-weight: bold;
  letter-spacing: 2px;

  max-width: 900px;
  margin-left: auto;
  margin-right: auto;

  line-height: 1.6;
  padding: 0 20px;

  text-shadow:
    0 0 5px #0094FF,
    0 0 10px #0094FF,
    0 0 20px #0094FF;
}

   .gallery-wrapper {
  margin: 30px auto;
  width: 85%;
  max-width: 1200px;

  background: #0a0a0a;

  border-radius: 25px;
  padding: 20px;

  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap: 15px;

  border: 1px solid rgba(255,255,255,0.08);
  box-shadow: 0 0 25px #0094FF;
}

.card img {
  width: auto;
  max-width: 100%;
  height: auto;
  display: block;
  border-radius: 12px;
}
footer {
  width: 100%;

  padding: 20px;

  display: grid;
  place-items: center;

  color: #fff;
}
  </style>
</head>

<body>

<header>
  <h1 class="hidden-title">DockSpatial</h1>
</header>

<div class="description">
  Ici, je construis des vaisseaux spatiaux à partir d’objets détournés, de pièces de maquettes et de matériaux récupérés.
</div>

<div class="gallery-wrapper">

  <div class="card">
    <a href="leleonidas.html">
      <img src="leonidassite.png" alt="Le leonidas">
    </a>
  </div>

  <div class="card">
    <a href="soucoupepdg.html">
      <img src="soucoupepdg.png">
    </a>
  </div>

  <div class="card">
    <a href="maquette3.html">
      <img src="https://via.placeholder.com/400" alt="Maquette 3">
    </a>
  </div>

</div>

<footer>
  © 2026 DockSpatial
</footer>

</body>
</html>
